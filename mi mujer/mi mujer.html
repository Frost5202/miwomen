<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mi Reina ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9ecf,#8e44ad);
color:white;
text-align:center;
overflow-x:hidden;
}

/* bienvenida */

#bienvenida{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

#bienvenida h1{
font-size:36px;
}

#entrar{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
cursor:pointer;
}

/* contenido */

#contenido{
display:none;
padding:20px;
}

#mensaje{
max-width:500px;
margin:auto;
font-size:18px;
line-height:1.6;
min-height:120px;
}

.regalo{
font-size:70px;
cursor:pointer;
margin-top:25px;
}

.galeria{
display:none;
margin-top:30px;
}

.slider{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}

.slider img{
width:70vw;
max-width:300px;
border-radius:15px;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
font-size:18px;
cursor:pointer;
}

/* video */

video{
width:80vw;
max-width:350px;
border-radius:15px;
margin-top:20px;
}

/* corazones */

.corazon{
position:fixed;
top:-10px;
font-size:25px;
animation:caer 6s linear infinite;
}

@keyframes caer{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

.clickHeart{
position:absolute;
font-size:20px;
animation:subir 2s forwards;
}

@keyframes subir{
0%{opacity:1;}
100%{transform:translateY(-100px);opacity:0;}
}

</style>
</head>

<body onclick="corazonClick(event)">

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- Bienvenida -->

<div id="bienvenida">

<h1>💖 Tengo algo para ti 💖</h1>

<p>Presiona el botón para ver tu sorpresa</p>

<button id="entrar" onclick="entrar()">Entrar ❤️</button>

</div>

<!-- Contenido -->

<div id="contenido">

<h1>Feliz Día Mi Vida 💖</h1>

<div id="mensaje"></div>

<div class="regalo" onclick="abrirRegalo()">🎁</div>

<div class="galeria" id="galeria">

<h2>Nuestros Momentos 📸</h2>

<div class="slider">

<button onclick="anterior()">⬅</button>

<img id="foto" src="foto1.jpg">

<button onclick="siguiente()">➡</button>

</div>

<br>

<img src="oso.gif" width="180">

<video controls autoplay loop>
<source src="video.mp4" type="video/mp4">
</video>

</div>

</div>

<script>

function entrar(){

document.getElementById("bienvenida").style.display="none"
document.getElementById("contenido").style.display="block"

let audio=document.getElementById("musica")
audio.play()

}

/* mensaje */

let texto=`Hoy es tu día mi vida preciosa aun
que no estés aquí quería darte un regalo
aunque sea así de sencillo espero que
te guste es lo único que se hacer por
ahora tengo mucho que decirte pero tendría
que crear millones de páginas más.

Te amo mi reyna 💖
que no se te olvide eres la mejor
y la niña de mis ojos.`

let i=0

function escribir(){

if(i<texto.length){

document.getElementById("mensaje").innerHTML+=texto.charAt(i)

i++

setTimeout(escribir,40)

}

}

escribir()

/* abrir regalo */

function abrirRegalo(){

document.getElementById("galeria").style.display="block"

}

/* fotos */

let fotos=[
"foto1.jpeg","foto2.jpeg","foto3.jpg","foto4.jpg","foto5.jpg",
"foto6.jpg","foto7.jpg","foto8.jpg","foto9.jpg","foto10.jpg",
"foto11.jpg","foto12.jpg","foto13.jpg","foto14.jpg","foto15.jpg"
]

let index=0

function siguiente(){

index++

if(index>=fotos.length) index=0

document.getElementById("foto").src=fotos[index]

}

function anterior(){

index--

if(index<0) index=fotos.length-1

document.getElementById("foto").src=fotos[index]

}

/* corazones */

function corazones(){

let heart=document.createElement("div")

heart.className="corazon"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{heart.remove()},6000)

}

setInterval(corazones,500)

function corazonClick(e){

let heart=document.createElement("div")

heart.className="clickHeart"

heart.innerHTML="❤️"

heart.style.left=e.clientX+"px"
heart.style.top=e.clientY+"px"

document.body.appendChild(heart)

setTimeout(()=>{heart.remove()},2000)

}

</script>

</body>
</html>
